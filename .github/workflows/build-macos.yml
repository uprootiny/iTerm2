name: Build iTerm2.app

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120

    env:
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show build environment
        run: |
          xcodebuild -version
          sw_vers
          uname -m

      - name: Install build dependencies
        run: |
          brew install cmake pkg-config automake python@3
          brew link --overwrite python@3 || true
          pip3 install --break-system-packages pyobjc
          brew install --cask sf-symbols || true

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust targets and cbindgen
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin
          cargo install cbindgen

      - name: Set up Info.plist
        run: test -f plists/iTerm2.plist || cp plists/dev-iTerm2.plist plists/iTerm2.plist

      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Build native dependencies
        run: |
          mkdir -p "$BUILD_DIR"
          make deps BUILD_DIR="$BUILD_DIR"

      - name: Kill orphan Xcode processes
        run: |
          killall ibtoold 2>/dev/null || true
          killall AssetCatalogSimulatorAgent 2>/dev/null || true

      - name: Build iTerm2.app (Development)
        run: |
          for attempt in 1 2 3; do
            echo "::group::Build attempt $attempt of 3"
            rm -f build_output.txt
            set +e
            xcodebuild \
              -scheme iTerm2 \
              -configuration Development \
              -destination 'platform=macOS' \
              -skipPackagePluginValidation \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              ARCHS="$(uname -m)" \
              ONLY_ACTIVE_ARCH=YES \
              SYMROOT="$BUILD_DIR" 2>&1 | tee build_output.txt
            exit_code=$?
            set -e
            echo "::endgroup::"

            if [ $exit_code -eq 0 ]; then
              echo "Build succeeded on attempt $attempt"
              break
            fi

            # Retry only for flaky ibtoold/asset catalog crashes (known Xcode 26 issue)
            if grep -q "CompileAssetCatalogVariant failed\|IBPlatformToolFailureException\|The tool closed the connection" build_output.txt; then
              echo "::warning::Attempt $attempt failed due to flaky ibtoold crash"
              if [ $attempt -lt 3 ]; then
                killall ibtoold 2>/dev/null || true
                killall AssetCatalogSimulatorAgent 2>/dev/null || true
                sleep 5
                continue
              fi
            fi
            echo "::error::Build failed on attempt $attempt"
            exit 1
          done

      - name: Verify .app bundle
        run: |
          APP_PATH="$BUILD_DIR/Development/iTerm2.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::iTerm2.app not found"
            ls -la "$BUILD_DIR/Development/" 2>/dev/null || echo "Development dir missing"
            exit 1
          fi
          echo "Built: $APP_PATH"
          lipo -info "$APP_PATH/Contents/MacOS/iTerm2" || true

      - name: Prepare artifact
        run: |
          chmod -R go+rX "$BUILD_DIR/Development"
          cd "$BUILD_DIR/Development"
          ditto -c -k --keepParent iTerm2.app iTerm2.app.zip

      - name: Upload iTerm2.app
        uses: actions/upload-artifact@v4
        with:
          name: iTerm2.app
          path: ${{ env.BUILD_DIR }}/Development/iTerm2.app.zip
          retention-days: 14
